name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Bước 1: Checkout code từ repository
    - uses: actions/checkout@v3
    
    # Bước 2: Setup .NET 10
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '10.0.x'
    
    # Bước 3: Restore dependencies
    - name: Restore dependencies
      run: dotnet restore
    
    # Bước 4: Build solution
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    # Bước 5: Kiểm tra code style (optional)
    - name: Check code format
      run: dotnet format --verify-no-changes --verbosity diagnostic
      continue-on-error: true
    
    # Bước 6: Tạo NuGet package (optional)
    - name: Pack NuGet
      run: dotnet pack MiniDropbox.Shared/MiniDropbox.Shared.csproj --configuration Release --output ./nupkg
      continue-on-error: true
